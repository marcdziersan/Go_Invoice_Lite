{{define "layout"}}
<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} · GoInvoice Lite</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">GoInvoice <span>Lite</span></a>
        {{if .CurrentUser}}
        <nav class="nav">
            <a href="/">Dashboard</a>
            <a href="/customers">Kunden</a>
            <a href="/quotes">Angebote</a>
            <a href="/invoices">Rechnungen</a>
            {{if .CurrentUser.IsAdmin}}
            <a href="/users">Benutzer</a>
            <a href="/audit">Audit</a>
            {{end}}
            <a href="/account/password">Passwort</a>
            <a href="/logout">Logout</a>
        </nav>
        {{end}}
    </header>

    <main class="page">
        {{template "content" .}}
    </main>

    <footer class="footer">
        <span>GoInvoice Lite</span>
        <span>Go · net/http · Templates · JSON Store · API</span>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
{{end}}
