{{define "content"}}
<section class="page-head">
    <div>
        <p class="eyebrow">Sales</p>
        <h1>{{.Title}}</h1>
    </div>
    <a class="button" href="/quotes">Zurück</a>
</section>

{{if .Error}}<div class="alert">{{.Error}}</div>{{end}}

<section class="panel narrow">
    <form method="post" class="form">
        <label>
            Kunde *
            <select name="customer_id" required>
                <option value="">Bitte wählen</option>
                {{range .Customers}}
                <option value="{{.ID}}" {{checkedID $.Quote.CustomerID .ID}}>{{.Company}}</option>
                {{end}}
            </select>
        </label>

        <label>
            Titel *
            <input name="title" value="{{.Quote.Title}}" required>
        </label>

        <label>
            Beschreibung
            <textarea name="description" rows="4">{{.Quote.Description}}</textarea>
        </label>

        <div class="form-grid">
            <label>
                Status
                <select name="status">
                    {{range .Statuses}}
                    <option value="{{.}}" {{selected $.Quote.Status .}}>{{.}}</option>
                    {{end}}
                </select>
            </label>
            <label>
                Gültig bis
                <input name="valid_until" type="date" value="{{.Quote.ValidUntil}}">
            </label>
        </div>

        <div class="line-items-head">
            <h2>Positionen</h2>
            <button class="button small" type="button" data-add-line-item>Position hinzufügen</button>
        </div>

        <div class="line-items" data-line-items>
            {{range .Quote.Items}}
            <div class="line-item" data-line-item>
                <label>
                    Beschreibung
                    <input name="item_description" value="{{.Description}}" placeholder="z. B. Website Wartung">
                </label>
                <label>
                    Menge
                    <input name="item_quantity" type="number" min="1" value="{{.Quantity}}">
                </label>
                <label>
                    Einzel netto
                    <input name="item_unit_net" value="{{money .UnitNetAmount}}" placeholder="0,00">
                </label>
                <label>
                    MwSt %
                    <input name="item_tax_rate" type="number" min="0" max="100" value="{{.TaxRate}}">
                </label>
                <button class="button danger small" type="button" data-remove-line-item>Entfernen</button>
            </div>
            {{end}}
        </div>

        <div class="totals-box">
            <span>Netto: <strong>{{money .Quote.NetAmount}}</strong></span>
            <span>MwSt: <strong>{{money .Quote.TaxAmount}}</strong></span>
            <span>Brutto: <strong>{{money .Quote.GrossAmount}}</strong></span>
        </div>

        <button class="button primary" type="submit">Speichern</button>
    </form>
</section>
{{end}}
