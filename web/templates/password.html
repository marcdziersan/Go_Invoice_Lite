{{define "content"}}
<section class="page-head">
    <div>
        <p class="eyebrow">Account</p>
        <h1>Passwort ändern</h1>
    </div>
    <a class="button" href="/">Zurück</a>
</section>

{{if .Error}}<div class="alert">{{.Error}}</div>{{end}}
{{if .Success}}<div class="alert success-alert">{{.Success}}</div>{{end}}

<section class="panel narrow">
    <form method="post" class="form">
        <label>
            Aktuelles Passwort
            <input name="current_password" type="password" required>
        </label>
        <label>
            Neues Passwort
            <input name="new_password" type="password" minlength="8" required>
        </label>
        <label>
            Neues Passwort wiederholen
            <input name="confirm_password" type="password" minlength="8" required>
        </label>
        <button class="button primary" type="submit">Passwort speichern</button>
    </form>
</section>
{{end}}
