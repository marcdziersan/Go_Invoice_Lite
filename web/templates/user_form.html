{{define "content"}}
<section class="page-head">
    <div>
        <p class="eyebrow">Administration</p>
        <h1>{{.Title}}</h1>
    </div>
    <a class="button" href="/users">Zurück</a>
</section>

{{if .Error}}<div class="alert">{{.Error}}</div>{{end}}

<section class="panel narrow">
    <form method="post" class="form">
        <label>
            Benutzername *
            <input name="username" value="{{.UserForm.Username}}" required>
        </label>
        <div class="form-grid">
            <label>
                Rolle
                <select name="role">
                    {{range .Roles}}<option value="{{.}}" {{selected $.UserForm.Role .}}>{{.}}</option>{{end}}
                </select>
            </label>
            <label class="checkbox-label">
                <input name="active" type="checkbox" value="1" {{checkedBool .UserForm.Active}}> Aktiv
            </label>
        </div>
        <label>
            {{if .IsNew}}Passwort *{{else}}Neues Passwort / Reset-Passwort{{end}}
            <input name="password" type="password" minlength="8" {{if .IsNew}}required{{end}}>
            {{if not .IsNew}}<span class="hint">Leer lassen, wenn das Passwort nicht geändert werden soll.</span>{{end}}
        </label>
        <button class="button primary" type="submit">Speichern</button>
    </form>
</section>
{{end}}
